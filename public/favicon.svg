<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .accent { fill: #2563eb; }
    .accent-light { fill: #2563eb; opacity: 0.6; }
    .accent-faint { fill: #2563eb; opacity: 0.4; }
    @media (prefers-color-scheme: dark) {
      .accent { fill: #60a5fa; }
      .accent-light { fill: #60a5fa; opacity: 0.6; }
      .accent-faint { fill: #60a5fa; opacity: 0.4; }
    }
  </style>
  <!-- Pixel grid: 3x3 with center square emphasized -->
  <rect class="accent-faint" x="2"  y="2"  width="8" height="8" rx="1.5"/>
  <rect class="accent-light" x="12" y="2"  width="8" height="8" rx="1.5"/>
  <rect class="accent-faint" x="22" y="2"  width="8" height="8" rx="1.5"/>
  <rect class="accent-light" x="2"  y="12" width="8" height="8" rx="1.5"/>
  <rect class="accent"       x="12" y="12" width="8" height="8" rx="1.5"/>
  <rect class="accent-light" x="22" y="12" width="8" height="8" rx="1.5"/>
  <rect class="accent-faint" x="2"  y="22" width="8" height="8" rx="1.5"/>
  <rect class="accent-light" x="12" y="22" width="8" height="8" rx="1.5"/>
  <rect class="accent-faint" x="22" y="22" width="8" height="8" rx="1.5"/>
</svg>
